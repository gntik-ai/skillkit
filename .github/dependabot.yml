version: 2
updates:
  # Keep GitHub Actions up to date. Combined with SHA-pinning (see SECURITY.md),
  # Dependabot will propose updates to the pinned commit when a new release ships.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
